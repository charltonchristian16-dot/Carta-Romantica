<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minha Página Especial</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
scroll-behavior:smooth;
}

body{
font-family:Arial,sans-serif;
background:#0f172a;
color:white;
overflow-x:hidden;
}

section{
min-height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
padding:40px;
text-align:center;
}

h1{
font-size:clamp(40px,8vw,70px);
margin-bottom:20px;
}

h2{
font-size:clamp(28px,5vw,40px);
margin-bottom:20px;
}

p{
max-width:800px;
line-height:1.8;
font-size:18px;
}

.btn{
background:#ec4899;
color:white;
padding:15px 35px;
border:none;
border-radius:50px;
font-size:18px;
cursor:pointer;
text-decoration:none;
margin-top:25px;
}

.btn:hover{
transform:scale(1.05);
}

.hero{
background:linear-gradient(135deg,#7c3aed,#ec4899);
}

.galeria{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:15px;
}

.galeria img{
width:250px;
height:250px;
object-fit:cover;
border-radius:20px;
}

.card{
background:rgba(255,255,255,.08);
backdrop-filter:blur(10px);
padding:30px;
border-radius:20px;
max-width:900px;
}

#contador{
font-size:45px;
font-weight:bold;
margin-top:20px;
}

.particula{
position:fixed;
color:#ec4899;
animation:subir linear infinite;
pointer-events:none;
}

@keyframes subir{
from{
transform:translateY(100vh);
opacity:1;
}
to{
transform:translateY(-100px);
opacity:0;
}
}

</style>
</head>

<body>

<section class="hero">

<h1>[TÍTULO PRINCIPAL]</h1>

<p>
[SUBTÍTULO]
</p>

<a href="#pagina2" class="btn">
Abrir
</a>

</section>

<section id="pagina2">

<div class="card">

<h2>[SEÇÃO 1]</h2>

<p>
[SEU TEXTO]
</p>

</div>

</section>

<section>

<div class="card">

<h2>[GALERIA]</h2>

<div class="galeria">

<img src="foto1.jpg">
<img src="foto2.jpg">
<img src="foto3.jpg">
<img src="foto4.jpg">

</div>

</div>

</section>

<section>

<div class="card">

<h2>[CONTADOR]</h2>

<div id="contador"></div>

</div>

</section>

<section>

<div class="card">

<h2>[ÁUDIO]</h2>

<audio id="musica" controls>
<source src="musica.mp3" type="audio/mpeg">
</audio>

</div>

</section>

<section>

<div class="card">

<h2>[MENSAGEM FINAL]</h2>

<p>
[SEU TEXTO FINAL]
</p>

</div>

</section>

<script>

const dataInicial = new Date("2024-01-01");

function atualizar(){

const hoje = new Date();

const dias = Math.floor(
(hoje - dataInicial) /
(1000*60*60*24)
);

document.getElementById("contador").innerHTML =
dias + " dias";

}

atualizar();

for(let i=0;i<30;i++){

const p=document.createElement("div");

p.innerHTML="❤️";

p.classList.add("particula");

p.style.left=Math.random()*100+"vw";
p.style.fontSize=(15+Math.random()*25)+"px";
p.style.animationDuration=(10+Math.random()*10)+"s";

document.body.appendChild(p);

}

</script>

</body>
</html>
``
